<h1>Lista de Agendamentos</h1>

{% for agendamento in agendamentos %}

<p>
    {{ agendamento.nome }}
    -
    {{ agendamento.servico }}
    -
    {{ agendamento.data }}

    <a href="{% url 'detalhar_agendamento' agendamento.pk %}">
        Ver
    </a>

    <a href="{% url 'editar_agendamento' agendamento.pk %}">
        Editar
    </a>

    <a href="{% url 'excluir_agendamento' agendamento.pk %}">
        Excluir
    </a>

</p>

{% endfor %}
